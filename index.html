// ── VOCAB (loaded from vocab.txt) ─────────────────────────────────────
let BUILTIN_VOCAB=[];
function parseVocab(text){
  return text.split('\n').filter(l=>l.trim()&&!l.startsWith('#')).map((l,i)=>{
    const p=l.split(' | ');
    if(p.length<6)return null;
    return{id:i+1,w:p[0].trim(),pos:p[1].trim(),lvl:parseInt(p[2].trim()),d:p[3].trim(),ex:p[4].trim(),root:p[5].trim()==='none'?null:p[5].trim()};
  }).filter(Boolean);
}

// ── ROOTS (loaded from root-words.txt) ────────────────────────
let ROOTS=[];
function parseRoots(text){
  return text.split('\n').filter(l=>l.trim()&&!l.startsWith('#')).map((l,i)=>{
    const p=l.split(' | ');
    if(p.length<5)return null;
    return{id:i+1,root:p[0].trim(),origin:p[1].trim(),meaning:p[2].trim(),words:p[3].trim().split(',').map(w=>w.trim()),sentence:p[4].trim()};
  }).filter(Boolean);
}

// ── ANALOGIES (loaded from analogies.txt) ─────────────────────
let ANALOGIES=[];
function parseAnalogies(text){
  return text.split('\n').filter(l=>l.trim()&&!l.startsWith('#')).map((l,i)=>{
    const p=l.split(' | ');
    if(p.length<9)return null;
    return{id:i+1,stem:p[0].trim(),type:p[1].trim(),ans:parseInt(p[2].trim()),ch:[p[3],p[4],p[5],p[6],p[7]].map(c=>c.trim().split('~')),tip:p[8].trim()};
  }).filter(Boolean);
}


// ── PASSAGES ──────────────────────────────────────────────────
const PASSAGES=[
  {
    id:1,
    title:"Thoreau and the Art of Principled Refusal",
    text:"In the summer of 1846, Henry David Thoreau spent a single night in a Concord, Massachusetts jail cell. His offense: refusing to pay a poll tax he considered complicit in the institution of slavery and in the Mexican-American War. A friend paid the tax on his behalf, and Thoreau was released the next morning — furious at the intervention. That brief imprisonment became the seed of one of the most influential political essays in American history, now known as Civil Disobedience.\n\nThoreau's central argument was deceptively simple: when a government enacts laws that are unjust, the morally serious person is obligated not merely to disagree but to refuse compliance — openly, peacefully, and at personal cost. He was contemptuous of what he called the majority of good men who, while privately disapproving of injustice, nevertheless obeyed the law and thus became its instruments. For Thoreau, passive acquiescence was a form of moral cowardice indistinguishable, in its practical effects, from active endorsement.\n\nWhat made his position genuinely radical was its insistence on the individual conscience as the supreme authority. No institution — church, state, or majority opinion — could override what a person recognized as right. This was not mere rebelliousness; Thoreau was equally skeptical of mobs and revolutions. What he championed was the solitary, deliberate act of a single person standing apart from the machinery of injustice.\n\nThe essay's legacy has been extraordinary. Mahatma Gandhi credited it as a formative influence on his philosophy of satyagraha, or truth-force, which guided India's independence movement. Martin Luther King Jr. read Civil Disobedience as a seminary student and later described it as electrifying. The essay traveled from a night in a small-town jail to the streets of Johannesburg, to the lunch counters of Birmingham, demonstrating that a private act of refusal, clearly articulated, can become a public philosophy of liberation.\n\nCritics have questioned whether Thoreau's individualism translates into a viable political strategy. His model assumes a government capable of being shamed by conscience — a luxury not available under every regime. Yet the core moral insight endures: that compliance is never truly neutral, and that every citizen bears some responsibility for the character of the state they sustain by their obedience.",
    qs:[
      {q:"Which best states the central argument of Thoreau's Civil Disobedience as described in the passage?",ch:["Citizens should work within legal channels to reform unjust laws rather than breaking them.","Individuals have a moral obligation to refuse compliance with laws they recognize as unjust.","Violent revolution is sometimes the only response to systematic government injustice.","Majority opinion is the most reliable guide to ethical political behavior."],ans:1},
      {q:"As used in the passage, 'acquiescence' most nearly means:",ch:["vocal protest","passive acceptance","deliberate sabotage","principled negotiation"],ans:1},
      {q:"The passage suggests Thoreau was 'furious' when his friend paid the tax because:",ch:["he believed the tax was actually a reasonable law.","the payment deprived him of the symbolic act of principled resistance.","he wanted to serve a longer sentence to attract more attention.","he thought his friend had betrayed the abolitionist cause."],ans:1},
      {q:"The author mentions Gandhi and Martin Luther King Jr. primarily in order to:",ch:["suggest Thoreau's ideas were more important than his literary style.","demonstrate that civil disobedience only works in democratic societies.","illustrate the broad and lasting political influence of Thoreau's essay.","argue that nonviolent protest is always superior to legal reform."],ans:2},
      {q:"What is the primary criticism of Thoreau's philosophy mentioned in the final paragraph?",ch:["His essay is written in a style too dense for ordinary readers to understand.","His reliance on individual conscience ignores the need for organized movements.","His model presupposes a government sensitive to moral pressure, which not all regimes are.","His night in jail was too brief to constitute genuine personal sacrifice."],ans:2}
    ]
  },
  {
    id:2,
    title:"The Microbiome and the Complexity of the Gut",
    text:"For most of medical history, bacteria were the enemy — organisms to be eliminated with soap, sanitation, and antibiotics. That framework has been overturned with remarkable speed. Scientists now recognize that the human body harbors approximately 38 trillion microbial cells, roughly equal in number to the body's own human cells. This vast internal ecosystem, collectively called the microbiome, is not a passive tenant. It actively shapes digestion, immune function, metabolism, and — most provocatively — behavior.\n\nThe gut-brain axis is the communication highway linking the enteric nervous system of the gastrointestinal tract to the central nervous system of the brain. This pathway runs in both directions. The vagus nerve, a cranial nerve stretching from the brainstem to the abdomen, transmits signals upward to the brain; the gut microbiome influences those signals by producing neurotransmitters including serotonin, dopamine, and gamma-aminobutyric acid. Remarkably, approximately 90 percent of the body's serotonin — a compound widely associated with mood regulation — is produced in the gut rather than the brain.\n\nAnimal studies have yielded striking results. Mice raised in sterile environments, possessing no microbiome, exhibit heightened anxiety and altered stress responses compared to conventionally raised mice. When researchers transplanted gut bacteria from calm mice into anxious ones, they observed measurable reductions in anxiety-related behavior. Subsequent experiments demonstrated that transplanting human gut bacteria associated with depression into germ-free rodents produced depressive behaviors in the animals — a finding that challenges the assumption that mental states originate exclusively in the brain.\n\nHuman research is less definitive but increasingly suggestive. Epidemiological studies have found correlations between disrupted microbiomes — caused by antibiotic overuse, poor diet, or early-life stress — and elevated rates of anxiety, depression, and autism spectrum disorder. Clinical trials investigating probiotic supplementation as a complement to conventional psychiatric treatment are ongoing, though the evidence base remains preliminary.\n\nScientists are careful to note that correlation is not causation, and the microbiome field is prone to both sensationalism and premature extrapolation. Nevertheless, the emerging picture complicates reductive notions of selfhood: the boundaries between what is recognizably human and what is microbial turn out to be far less sharp than anatomy textbooks once implied.",
    qs:[
      {q:"What is the main idea of this passage?",ch:["Antibiotics have caused irreversible damage to human health by destroying beneficial bacteria.","The human microbiome plays a far more complex and influential role in the body and mind than previously understood.","Probiotic supplements are a proven treatment for depression and anxiety disorders.","Recent discoveries suggest that the human gut contains more cells than the human brain."],ans:1},
      {q:"According to the passage, what is significant about serotonin production in the body?",ch:["It is produced primarily in the brainstem, which connects to the gut through the vagus nerve.","It is the only neurotransmitter manufactured by gut bacteria.","Approximately 90 percent of it is produced in the gut rather than in the brain.","Its production increases sharply when subjects consume probiotic supplements."],ans:2},
      {q:"The author describes the human body as a potential 'collaborative superorganism' primarily to suggest that:",ch:["human cells are gradually being replaced by microbial cells over time.","the distinction between the human organism and its microbial residents is less clear than once believed.","microbes are ultimately more important to survival than human cells are.","cooperation between gut bacteria is the key mechanism behind mood regulation."],ans:1},
      {q:"Which best describes the author's tone in discussing the gut-brain connection?",ch:["Dismissive, treating the gut-brain axis as an overhyped scientific trend.","Alarmed, warning readers about the dangers of a disrupted microbiome.","Measured and curious, acknowledging exciting findings while noting their limitations.","Polemical, arguing that psychiatry must abandon brain-focused treatment models."],ans:2},
      {q:"Based on the passage, which can be reasonably inferred about germ-free mice?",ch:["They develop stronger immune systems because they are not exposed to harmful bacteria.","Their brains produce more serotonin to compensate for the absence of gut bacteria.","They provide a useful experimental model for isolating the behavioral effects of microbiome changes.","They are incapable of experiencing stress because they lack the gut-brain axis."],ans:2}
    ]
  },
  {
    id:3,
    title:"The Unreliable Narrator and the Ethics of Storytelling",
    text:"Every story is told from somewhere. Even the most transparent-seeming narrative reflects the choices, omissions, and distortions of the consciousness that shapes it. Literary critics have long recognized a spectrum of narrators ranging from the omniscient — who sees all, knows all, and withholds little — to the unreliable, whose account is compromised by self-interest, delusion, limited knowledge, or outright dishonesty. The unreliable narrator is not merely a clever technique; it is a philosophical instrument for interrogating the nature of truth itself.\n\nThe term was formally introduced by the critic Wayne Booth in his 1961 study The Rhetoric of Fiction, though the technique is far older. When the first-person narrator of Edgar Allan Poe's The Tell-Tale Heart insists, in the opening sentence, that he is not mad, the reader immediately recognizes a gap between the narrator's self-assessment and the evidence of his account. The dramatic tension of the entire story lives in that gap. Similarly, in Kazuo Ishiguro's novel The Remains of the Day, the butler Stevens narrates his life with meticulous propriety while systematically suppressing evidence of his own emotional devastation — a repression so thorough that it becomes the subject of the novel rather than merely its style.\n\nWhat makes the technique ethically interesting is the demand it places on readers. A reliable narrator invites passive reception; an unreliable one demands active participation. Readers must simultaneously follow the story the narrator tells and construct the story the narrator cannot or will not tell. This dual attention cultivates a habit of mind — skepticism toward surfaces, sensitivity to what is absent — that has value well beyond literary analysis.\n\nSome critics argue that celebrating the unreliable narrator romanticizes deception and erodes trust in storytelling as a communicative act. If narrators routinely mislead, why should readers grant any narrative the benefit of the doubt? This objection has force, but it conflates two distinct things: the unreliability of a fictional narrator and the unreliability of the author who constructs that narrator. Ishiguro does not deceive his readers; he invites them into a complex act of recognition. The author and the narrator occupy different ethical positions.\n\nUltimately, the unreliable narrator may be the most honest of literary devices precisely because it refuses the comfortable fiction that any account of events is purely transparent. All storytelling selects, frames, and interprets. The unreliable narrator simply makes those processes visible.",
    qs:[
      {q:"The author's primary purpose in this passage is to:",ch:["argue that unreliable narrators are more common than reliable ones in literary fiction.","examine the unreliable narrator as a literary technique with philosophical and ethical dimensions.","persuade readers that Kazuo Ishiguro is the greatest practitioner of unreliable narration.","summarize Wayne Booth's contributions to the formal study of narrative theory."],ans:1},
      {q:"According to the passage, what ethical demand does an unreliable narrator place on readers?",ch:["Readers must evaluate the moral character of the narrator before accepting any information.","Readers must simultaneously track the narrator's account and reconstruct what that account conceals.","Readers are obligated to research the historical context of any story with an unreliable narrator.","Readers should inform other readers about the story's deceptions."],ans:1},
      {q:"As used in the passage, 'conflates' most nearly means:",ch:["distinguishes carefully between","falsely identifies as the same","dramatically overstates","quietly acknowledges"],ans:1},
      {q:"The author mentions the opening line of Poe's The Tell-Tale Heart primarily to illustrate:",ch:["how first-person narration is generally less trustworthy than third-person narration.","how a gap between a narrator's self-assessment and the evidence creates dramatic tension.","why horror fiction depends more heavily on unreliable narrators than other genres do.","how Poe influenced the formal development of narrative theory in the twentieth century."],ans:1},
      {q:"Which best describes the author's response to critics who argue that unreliable narrators erode trust in storytelling?",ch:["The author agrees that unreliable narrators pose a genuine danger to literary culture.","The author dismisses the objection without engaging its underlying concern.","The author argues the objection confuses the fictional narrator with the author, who operates at a different ethical level.","The author suggests that only realist fiction avoids the problems created by unreliable narration."],ans:2}
    ]
  },
  {
    id:4,
    title:"The Trolley Problem and the Limits of Moral Theory",
    text:"Imagine a runaway trolley hurtling down a track toward five workers who cannot escape. You stand beside a lever. Pull it, and the trolley diverts onto a side track — but one worker stands there and will die. Do nothing, and five die. Do you pull the lever?\n\nMost people, when asked this question, say yes. The mathematics seem clear: one life against five. But the philosopher Judith Jarvis Thomson introduced a variation that scrambles these intuitions. Now imagine you are on a footbridge above the tracks. The only way to stop the trolley before it kills five workers is to push a large man off the bridge in front of it; his body will halt the trolley. The arithmetic is the same — one life to save five — yet a large majority of respondents refuse to push. What changed?\n\nThis puzzle, known as the trolley problem, has become the central thought experiment of contemporary moral philosophy, generating hundreds of academic papers and spilling into psychology, neuroscience, and public policy. Its philosophical value lies not in producing a clean answer but in exposing the gap between two major ethical traditions. Utilitarianism, associated with Jeremy Bentham and John Stuart Mill, holds that the right action is whichever produces the greatest good for the greatest number. Deontological ethics, associated with Immanuel Kant, holds that certain actions are intrinsically wrong regardless of their consequences. Using a person purely as a means to an end violates a fundamental moral principle, however beneficial the outcome.\n\nNeuroscientists have brought a third perspective. Using brain-imaging studies, Joshua Greene and his colleagues found that the footbridge scenario activates emotional regions of the brain far more strongly than the lever scenario does. This suggests our reluctance to push the man may reflect evolved emotional responses rather than principled moral reasoning. If true, it raises a disquieting question: are our moral intuitions reliable guides to ethical truth, or are they simply the residue of evolutionary pressures that have no necessary connection to what is actually right?\n\nThe trolley problem does not resolve this question — no thought experiment can. But it performs an essential philosophical service: it forces us to notice that our moral lives are governed by principles we rarely articulate, that those principles sometimes conflict, and that the conflict between them is not always resolvable by calculation alone.",
    qs:[
      {q:"What is the central philosophical purpose of the trolley problem as described in the passage?",ch:["To prove that utilitarian ethics provides the most reliable basis for moral decision-making.","To demonstrate that ordinary people are incapable of consistent moral reasoning.","To expose the tension between consequences-based and principle-based ethical frameworks.","To show that neuroscience has definitively explained the origins of human morality."],ans:2},
      {q:"According to the passage, why do most people respond differently to the footbridge scenario despite identical arithmetic?",ch:["The footbridge scenario involves a larger number of workers and therefore feels more consequential.","The footbridge scenario activates stronger emotional responses linked to direct personal harm.","In the footbridge scenario, the bystander is considered more morally responsible for the situation.","The footbridge scenario is easier to evaluate using deontological ethics."],ans:1},
      {q:"As used in the passage, 'deontological' most nearly refers to an ethics based on:",ch:["calculating which outcome produces the greatest benefit for the most people.","innate emotional responses that guide behavior without conscious reasoning.","the principle that some actions are inherently wrong regardless of their outcomes.","the study of how evolutionary pressures shape moral intuitions over time."],ans:2},
      {q:"The author describes Greene's neuroscience findings as 'disquieting' because they suggest that:",ch:["the brain cannot distinguish between morally equivalent situations.","emotional brain regions are incapable of generating rational responses to ethical questions.","our moral intuitions may reflect evolutionary history rather than genuine ethical truth.","neuroscience has made traditional philosophical inquiry into ethics obsolete."],ans:2},
      {q:"Which statement best reflects the author's overall attitude toward the trolley problem?",ch:["The author regards it as an overly abstract puzzle with little relevance to real-world ethics.","The author values it as a tool that makes visible the underlying tensions in our moral thinking.","The author believes it decisively favors a utilitarian approach over a deontological one.","The author treats it primarily as evidence that neuroscience should replace philosophy in studying morality."],ans:1}
    ]
  }
];

const SK="ssat_prep_upper_v1";
const mkP=()=>({vh:{},ah:{},rh:{},streak:0,lastDate:null,xp:0,learned:{vocabIds:[],rootIds:[]}});
const loadP=()=>{try{return{...mkP(),...JSON.parse(localStorage.getItem(SK)||"{}")}}catch{return mkP()}};

let progress=loadP(), customWords=loadC(), customRoots=loadCR();
const allVocab=()=>[...BUILTIN_VOCAB,...customWords];
const getDailyWords=()=>allVocab().map(w=>{const h=progress.vh[w.id]||{c:0,i:0,t:0};return{...w,score:h.i/Math.max(1,h.c+h.i)*10+(Date.now()-(h.t||0))/1e7}}).sort((a,b)=>b.score-a.score).slice(0,30);
const today=()=>new Date().toISOString().slice(0,10);
const addXP=xp=>{const t=today(),prev=progress.lastDate,yest=new Date();yest.setDate(yest.getDate()-1);const ys=yest.toISOString().slice(0,10);let s=progress.streak;if(prev!==t)s=prev===ys?s+1:1;progress={...progress,xp:progress.xp+xp,streak:s,lastDate:t};saveP(progress)};

let dailyWords=[],vIdx=0,vInput='',vChecked=false,vMatchResult=null,vDone=false,vResults=[];

let aQueue=[...ANALOGIES].sort(()=>Math.random()-.5),aIdx=0,aChosen=null,aScore={c:0,t:0};

const VSTOP=new Set(['a','an','the','is','to','of','and','or','that','it','as','in','by','for','with','its','be','are','was','were','has','have','had','not','at','on','from','about','s','do','does','their','them','they','one','this','which','very','so','such','more','most','also','into','than']);
function scoreMatch(inp,def){
  const tok=s=>s.toLowerCase().replace(/[^a-z\s]/g,'').split(/\s+/).filter(w=>w.length>2&&!VSTOP.has(w));
  const dt=tok(def);if(!dt.length)return 0;
  const it=tok(inp);let m=0;
  dt.forEach(d=>{if(it.some(i=>i===d||(d.length>=4&&i.length>=4&&(d.startsWith(i.slice(0,4))||i.startsWith(d.slice(0,4)))))) m++;});
  return m/dt.length;
}
function checkVocab(){
  const score=scoreMatch(vInput,dailyWords[vIdx].d);
  vMatchResult=score>=0.65?'great':score>=0.35?'close':'missed';
  vChecked=true;render();
}
function advanceVocab(override){
  const r=override||vMatchResult;
  const w=dailyWords[vIdx];
  const h=progress.vh[w.id]||{c:0,i:0,t:0};
  progress.vh[w.id]={c:h.c+(r!=='missed'?1:0),i:h.i+(r==='missed'?1:0),t:Date.now()};

  vResults.push({w:w.w,r});
  if(vIdx+1>=dailyWords.length)vDone=true;
  else{vIdx++;vInput='';vChecked=false;vMatchResult=null;}
  render();
}

function startAnalogies(){aQueue=[...ANALOGIES].sort(()=>Math.random()-.5);aIdx=0;aChosen=null;aScore={c:0,t:0};go('analogies')}

function renderAnalogy_choice(c, i, ans, chosen){
  const answered = chosen!==null;
  let cls='answer-btn';
  if(answered){if(i===ans)cls+=' correct';else if(i===chosen)cls+=' wrong';}
  const label = c[0]+' is to '+c[1];
  return `<button class="${cls}" ${answered?'disabled':''} onclick="answerAnalogy(${i})"><span class="choice-letter">${LETTERS[i]}</span>${label}</button>`;
}

function renderAnalogies(){
  const q=aQueue[aIdx%aQueue.length],answered=aChosen!==null,correct=aChosen===q.ans;
  return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">

  </div>
  <div class="analogy-stem">

  ${q.ch.map((c,i)=>renderAnalogy_choice(c,i,q.ans,aChosen)).join('')}
  ${answered?`<div style="background:${correct?'#dcfce7':'#fef9c3'};border-radius:14px;padding:14px;margin-top:6px">
    <p style="font-weight:800;color:${correct?'#166534':'#92400e'};margin-bottom:6px">${correct?'🎉 Correct! +15 XP':'💡 Not quite — here\'s why:'}</p>
    <p style="font-size:13px;color:#374151;margin-bottom:10px">${q.tip}</p>
    <button class="btn btn-primary" onclick="nextAnalogy()">Next Question →</button>
  </div>`:''}`;
}

function answerAnalogy(i){
  if(aChosen!==null)return;aChosen=i;
  const q=aQueue[aIdx%aQueue.length],correct=i===q.ans;
  aScore={c:aScore.c+(correct?1:0),t:aScore.t+1};

  progress.ah[q.id]={c:h.c+(correct?1:0),i:h.i+(correct?0:1)};
  addXP(correct?15:2);render();
}
function nextAnalogy(){aIdx++;aChosen=null;render();}

// ── PASTE IMPORT ─────────────────────────────────────────────
function importPastedWords(){
  pasteErr="";pasteSuccess="";
  if(!pasteText.trim()){pasteErr="Please paste some words first.";render();return;}
  const lines=pasteText.split('\n').map(l=>l.trim()).filter(Boolean);
  let added=0,skipped=0;
  lines.forEach(line=>{
    let word="",def="";
    const sep=line.match(/^(.+?)\s*(?:—|--|–|-|:)\s*(.+)$/);
    if(sep){word=sep[1].trim();def=sep[2].trim();}
    else{word=line.trim();def="";}
    if(!word)return;
    if(allVocab().find(v=>v.w.toLowerCase()===word.toLowerCase())){skipped++;return;}
    const newWord={id:'c_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),w:word,d:def,ex:def?word+' — '+def:'',pos:'adj',root:null,lvl:2,custom:true};
    customWords.push(newWord);
    if(def){ensureLearned();progress.learned.vocabIds.push(newWord.id);}
    added++;
  });
  saveC(customWords);saveP(progress);
  if(added>0)pasteSuccess=added+' word'+(added!==1?'s':'')+' imported!'+(skipped>0?' ('+skipped+' already existed)':'');
  else if(skipped>0)pasteErr='All '+skipped+' words already exist in your word bank.';
  else pasteErr='Could not parse any words from the text.';
  pasteText="";render();
}

// ── MY QUIZ ──────────────────────────────────────────────────
function shortDef(def){
  if(!def)return'';
  let s=def.split(';')[0].trim();
  s=s.replace(/^To\s+/i,'');
  return s.charAt(0).toLowerCase()+s.slice(1);
}

function generateLearnedQuiz(){
  ensureLearned();
  const items=[];const seen=new Set();
  const learnedVocab=allVocab().filter(w=>isVocabLearned(w.id)&&w.d);
  const allDefs=allVocab().filter(w=>w.d);
  learnedVocab.forEach(w=>{
    const key=w.w.toLowerCase();if(seen.has(key))return;seen.add(key);
    const ans=shortDef(w.d);
    const pool=allDefs.filter(v=>v.id!==w.id&&shortDef(v.d)!==ans);
    const distractors=pool.sort(()=>Math.random()-.5).slice(0,4).map(v=>shortDef(v.d));
    const choices=[ans,...distractors].sort(()=>Math.random()-.5);
    items.push({type:'vocab',word:w.w.toUpperCase(),answer:ans,choices,fullDef:w.d,tip:w.ex,root:w.root,id:w.id});
  });
  const learnedRoots=ROOTS.filter(r=>isRootLearned(r.id));
  learnedRoots.forEach(r=>{
    const key=r.root.toLowerCase();if(seen.has(key))return;seen.add(key);
    const pool=ROOTS.filter(x=>x.id!==r.id);
    const distractors=pool.sort(()=>Math.random()-.5).slice(0,4).map(x=>x.meaning);
    const choices=[r.meaning,...distractors].sort(()=>Math.random()-.5);
    items.push({type:'root',word:r.root.toUpperCase(),answer:r.meaning,choices,fullDef:r.meaning,tip:r.sentence,words:r.words,id:r.id});
  });
  return items.sort(()=>Math.random()-.5).slice(0,30);
}

function generateWrongWordsQuiz(){
  const missed=getMissedWords();
  const allDefs=allVocab().filter(w=>w.d);
  const items=[];const seen=new Set();
  missed.forEach(w=>{
    if(!w.d)return;
    const key=w.w.toLowerCase();if(seen.has(key))return;seen.add(key);
    const ans=shortDef(w.d);
    const pool=allDefs.filter(v=>v.id!==w.id&&shortDef(v.d)!==ans);
    const distractors=pool.sort(()=>Math.random()-.5).slice(0,4).map(v=>shortDef(v.d));
    const choices=[ans,...distractors].sort(()=>Math.random()-.5);
    items.push({type:'vocab',word:w.w.toUpperCase(),answer:ans,choices,fullDef:w.d,tip:w.ex,root:w.root,id:w.id,missRate:w.missRate,misses:w.i,attempts:w.c+w.i});
  });
  return items.slice(0,30);
}

function startWrongWordsQuiz(){
  mqQuestions=generateWrongWordsQuiz();mqIdx=0;mqChosen=null;mqScore={c:0,t:0};mqDone=false;mqResults=[];mqMode='wrong';go('myquiz');
}


let mqMode='learned';
function startMyQuiz(){
  mqQuestions=generateLearnedQuiz();mqIdx=0;mqChosen=null;mqScore={c:0,t:0};mqDone=false;mqResults=[];mqMode='learned';go('myquiz');
}

function answerMyQuiz(i){
  if(mqChosen!==null)return;
  const q=mqQuestions[mqIdx];
  mqChosen=i;
  const correct=q.choices[i]===q.answer;
  mqScore={c:mqScore.c+(correct?1:0),t:mqScore.t+1};
  if(q.type==='vocab'){
    const h=progress.vh[q.id]||{c:0,i:0,t:0};
    progress.vh[q.id]={c:h.c+(correct?1:0),i:h.i+(correct?0:1),t:Date.now()};
  }
  addXP(correct?10:2);
  mqResults.push({word:q.word,type:q.type,correct});
  render();
}

function nextMyQuiz(){
  if(mqIdx+1>=mqQuestions.length)mqDone=true;
  else{mqIdx++;mqChosen=null;}
  render();
}

    const ans=shortDef(w.d);
    const pool=allDefs.filter(v=>v.id!==w.id&&shortDef(v.d)!==ans);
    const distractors=pool.sort(()=>Math.random()-.5).slice(0,4).map(v=>shortDef(v.d));
    const choices=[ans,...distractors].sort(()=>Math.random()-.5);
    items.push({type:'vocab',word:w.w.toUpperCase(),answer:ans,choices,fullDef:w.d,tip:w.ex,root:w.root,id:w.id,missRate:w.missRate,misses:w.i,attempts:w.c+w.i});
  });
  wrQuestions=items.slice(0,30);wrIdx=0;wrChosen=null;wrScore={c:0,t:0};wrDone=false;wrResults=[];go('weeklyreview');
}

function answerWeeklyReview(i){
  if(wrChosen!==null)return;
  const q=wrQuestions[wrIdx];
  wrChosen=i;
  const correct=q.choices[i]===q.answer;
  wrScore={c:wrScore.c+(correct?1:0),t:wrScore.t+1};
  const h=progress.vh[q.id]||{c:0,i:0,t:0};
  progress.vh[q.id]={c:h.c+(correct?1:0),i:h.i+(correct?0:1),t:Date.now()};
  addXP(correct?10:2);
  wrResults.push({word:q.word,correct,missRate:q.missRate});
  render();
}

function nextWeeklyReview(){
  if(wrIdx+1>=wrQuestions.length)wrDone=true;
  else{wrIdx++;wrChosen=null;}
  render();
}

function renderProgress(){
  const vh=Object.values(progress.vh),tV=vh.reduce((s,h)=>s+h.c+h.i,0),cV=vh.reduce((s,h)=>s+h.c,0),aV=tV>0?Math.round(cV/tV*100):0;
  const ah=Object.values(progress.ah),tA=ah.reduce((s,h)=>s+h.c+h.i,0),cA=ah.reduce((s,h)=>s+h.c,0),aA=tA>0?Math.round(cA/tA*100):0;
  const rh=Object.values(progress.rh),tR=rh.reduce((s,h)=>s+h.c+h.i,0),cR=rh.reduce((s,h)=>s+h.c,0),aR=tR>0?Math.round(cR/tR*100):0;
  const bar=(label,c,t)=>{const pct=t>0?Math.round(c/t*100):0,col=pct>=80?'#16a34a':pct>=60?'#d97706':'#dc2626';return`<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:13px;font-weight:700;color:#374151">${label}</span><span class="muted">${c}/${t} (${pct}%)</span></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${col}"></div></div></div>`;};
  const all=allVocab();
  const hardest=all.filter(w=>progress.vh[w.id]&&progress.vh[w.id].i>0).map(w=>({...w,...progress.vh[w.id]})).sort((a,b)=>(b.i/(b.c+b.i))-(a.i/(a.c+a.i))).slice(0,5);
  const typeStats={};ANALOGIES.forEach(q=>{const h=progress.ah[q.id];if(!h)return;if(!typeStats[q.type])typeStats[q.type]={c:0,t:0};typeStats[q.type].c+=h.c;typeStats[q.type].t+=h.c+h.i;});
  const empty=tV===0&&tA===0&&tR===0;
  return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px"><h1 style="margin:0">My Progress</h1><button onclick="go('parentdash')" style="background:#0f2545;color:#fff;border:none;border-radius:10px;padding:8px 14px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer">Parent View</button></div>
  <div class="stat-grid"><div class="stat-box"><div style="font-size:18px">📖</div><div class="stat-val" style="font-size:20px;color:#3b82f6">${aV}%</div><div class="stat-lbl">Vocab</div></div><div class="stat-box"><div style="font-size:18px">🔗</div><div class="stat-val" style="font-size:20px;color:#8b5cf6">${aA}%</div><div class="stat-lbl">Analogies</div></div><div class="stat-box"><div style="font-size:18px">📜</div><div class="stat-val" style="font-size:20px;color:#10b981">${aR}%</div><div class="stat-lbl">Reading</div></div></div>

  ${Object.keys(typeStats).length>0?`<div class="card"><h2 style="font-size:14px;margin-bottom:14px">Analogy Types — Where to Focus</h2>${Object.entries(typeStats).sort((a,b)=>(b[1].t>0?b[1].c/b[1].t:0)-(a[1].t>0?a[1].c/a[1].t:0)).map(([t,s])=>bar(t,s.c,s.t)).join('')}</div>`:''}
  ${hardest.length>0?`<div class="card" style="border:2px solid #fed7aa;background:#fff8f0"><h2 style="font-size:14px;color:#c2410c;margin-bottom:12px">⚠️ Focus Words — Needs More Practice</h2>${hardest.map(w=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #fed7aa"><div><span style="font-weight:700;color:#374151">${w.w}</span>${w.custom?'<span class="badge" style="background:#fce7f3;color:#9d174d;margin-left:6px;font-size:10px">MY WORD</span>':''}<span class="muted" style="font-size:12px;margin-left:8px;display:block">${w.d.split(';')[0]}</span></div><span style="font-size:12px;color:#dc2626;font-weight:800;flex-shrink:0">${Math.round(w.i/(w.c+w.i)*100)}% miss</span></div>`).join('')}</div>`:''}

// ── PARENT DASHBOARD ─────────────────────────────────────────
function renderParentDash(){
  const all=allVocab();

  // Analogy type stats
  const typeStats={};
  ANALOGIES.forEach(q=>{
    const h=progress.ah[q.id];
    if(!h||(h.c+h.i===0)) return;
    if(!typeStats[q.type]) typeStats[q.type]={c:0,t:0,examples:[]};
    typeStats[q.type].c+=h.c;
    typeStats[q.type].t+=h.c+h.i;
    if(h.i>0) typeStats[q.type].examples.push(q.stem);
  });
  const typeArr=Object.entries(typeStats)
    .map(([t,s])=>({type:t,c:s.c,t:s.t,acc:Math.round(s.c/s.t*100),examples:s.examples}))
    .sort((a,b)=>a.acc-b.acc);
  const weakTypes=typeArr.filter(x=>x.acc<70);

  // Vocab stats by level and root
  const lvlStats={1:{c:0,i:0},2:{c:0,i:0},3:{c:0,i:0}};
  const rootMiss={};
  const missedWords=[];
  all.forEach(w=>{
    const h=progress.vh[w.id];
    if(!h||(h.c+h.i===0)) return;
    const lv=w.lvl||2;
    lvlStats[lv].c+=h.c; lvlStats[lv].i+=h.i;
    if(h.i>0){
      missedWords.push({...w,...h,rate:Math.round(h.i/(h.c+h.i)*100)});
      if(w.root){
        const rk=w.root.split('(')[0].trim();
        if(!rootMiss[rk]) rootMiss[rk]={words:[],i:0};
        rootMiss[rk].words.push(w.w); rootMiss[rk].i+=h.i;
      }
    }
  });
  missedWords.sort((a,b)=>b.rate-a.rate);
  const topMiss=missedWords.slice(0,8);
  const rootArr=Object.entries(rootMiss).sort((a,b)=>b[1].i-a[1].i).slice(0,5);

  // Reading stats
  const rhVals=Object.values(progress.rh);
  const rTotal=rhVals.reduce((s,h)=>s+h.c+h.i,0);
  const rCorr=rhVals.reduce((s,h)=>s+h.c,0);
  const rAcc=rTotal>0?Math.round(rCorr/rTotal*100):null;

  // Analogy + vocab overall
  const ahVals=Object.values(progress.ah);
  const aTotal=ahVals.reduce((s,h)=>s+h.c+h.i,0);
  const aCorr=ahVals.reduce((s,h)=>s+h.c,0);
  const aAcc=aTotal>0?Math.round(aCorr/aTotal*100):null;
  const vhVals=Object.values(progress.vh);
  const vTotal=vhVals.reduce((s,h)=>s+h.c+h.i,0);
  const vCorr=vhVals.reduce((s,h)=>s+h.c,0);
  const vAcc=vTotal>0?Math.round(vCorr/vTotal*100):null;

  const noData=vTotal===0&&aTotal===0&&rTotal===0;
  if(noData) return `<button style="background:none;border:none;color:#6b7280;cursor:pointer;margin-bottom:12px;font-family:'Nunito',sans-serif;font-size:14px" onclick="go('progress')">← Back</button>
    <h1 style="margin-bottom:6px">Parent Dashboard</h1>
    <div style="text-align:center;padding:40px 0"><div style="font-size:52px">🌱</div>
    <p style="font-weight:700;color:#374151;margin-top:14px">No data yet!</p>
    <p class="muted" style="margin-top:6px">Have her complete some practice sessions first, then come back here.</p></div>`;

  // Build focus recommendations
  const recs=[];
  if(weakTypes.length>0){
    const worst=weakTypes[0];
    recs.push({icon:"🔗",color:"#fef9c3",border:"#fde68a",text:"#78350f",
      title:`Weakest analogy type: "${worst.type}" (${worst.acc}%)`,
      detail:`She's getting ${100-worst.acc}% wrong on ${worst.type} analogies after ${worst.t} attempts. Strategy: before choosing, say the relationship out loud — e.g. "A is a type of B." Example she missed: "${worst.examples[0]||''}"`});
  }
  if(weakTypes.length>1){
    const second=weakTypes[1];
    recs.push({icon:"🔗",color:"#fff7ed",border:"#fed7aa",text:"#92400e",
      title:`Second weakest: "${second.type}" (${second.acc}%)`,
      detail:`${second.type} analogies are also a problem area. Practice identifying this relationship type specifically.`});
  }
  if(topMiss.length>0){
    recs.push({icon:"📖",color:"#fee2e2",border:"#fca5a5",text:"#991b1b",
      title:"High-miss vocabulary words",
      detail:`These words keep coming up wrong: ${topMiss.slice(0,4).map(w=>w.w+' ('+w.rate+'% miss rate)').join(', ')}. Try: say the definition, then use the word in a new sentence out loud.`});
  }
  if(rootArr.length>0){
    recs.push({icon:"🌿",color:"#dcfce7",border:"#6ee7b7",text:"#065f46",
      title:`Root word gap: "${rootArr[0][0]}"`,
      detail:`Words sharing the "${rootArr[0][0]}" root keep getting missed: ${rootArr[0][1].words.join(', ')}. Spend 10 minutes on that root in the Root Words section — one root unlocks many words at once.`});
  }
  const l3=lvlStats[3], l3total=l3.c+l3.i;
  if(l3total>3 && l3.i/l3total>0.4){
    recs.push({icon:"🎯",color:"#ede9fe",border:"#c4b5fd",text:"#5b21b6",
      title:"Level 3 (hardest) words need more time",
      detail:`She's missing ${Math.round(l3.i/l3total*100)}% of the hardest vocabulary. Try reviewing Level 3 words in separate short sessions rather than mixed with easier ones.`});
  }
  if(rAcc!==null&&rAcc<65){
    recs.push({icon:"📜",color:"#dbeafe",border:"#93c5fd",text:"#1e40af",
      title:`Reading comprehension at ${rAcc}% — needs attention`,
      detail:"Tip: On the real SSAT, passages are open-book — train her to go back to the passage and find the exact line before answering, rather than answering from memory."});
  }
  if(recs.length===0){
    recs.push({icon:"⭐",color:"#dcfce7",border:"#6ee7b7",text:"#065f46",
      title:"Great all-round performance!",
      detail:"No major weak spots detected. Keep up the daily practice — consistency is the key to SSAT success."});
  }

  const bar=(label,c,t)=>{const pct=t>0?Math.round(c/t*100):0;const col=pct>=80?'#16a34a':pct>=60?'#d97706':'#dc2626';
    return '<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:13px;font-weight:700;color:#374151">'+label+'</span><span style="font-size:12px;color:#6b7280">'+c+'/'+t+' correct &nbsp;·&nbsp; '+pct+'%</span></div><div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%;background:'+col+'"></div></div></div>';};

  const daysLeft=Math.max(0,Math.round((new Date('2026-10-01')-new Date())/864e5));
  const weeksLeft=Math.max(0,Math.round(daysLeft/7));

  return `<button style="background:none;border:none;color:#6b7280;cursor:pointer;margin-bottom:12px;font-family:'Nunito',sans-serif;font-size:14px" onclick="go('progress')">← Back to Progress</button>
  <h1 style="margin-bottom:2px">👩‍👧 Parent Dashboard</h1>
  <p class="muted" style="margin-bottom:18px">${daysLeft} days · ${weeksLeft} weeks until October 2026</p>

  <div style="display:flex;gap:8px;margin-bottom:18px">
    <div style="flex:1;background:#fff;border-radius:12px;padding:12px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.05)"><div style="font-size:20px;font-weight:900;color:#3b82f6">${vAcc!==null?vAcc+'%':'—'}</div><div style="font-size:10px;color:#9ca3af;margin-top:2px">Vocab</div></div>
    <div style="flex:1;background:#fff;border-radius:12px;padding:12px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.05)"><div style="font-size:20px;font-weight:900;color:#8b5cf6">${aAcc!==null?aAcc+'%':'—'}</div><div style="font-size:10px;color:#9ca3af;margin-top:2px">Analogies</div></div>
    <div style="flex:1;background:#fff;border-radius:12px;padding:12px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.05)"><div style="font-size:20px;font-weight:900;color:#10b981">${rAcc!==null?rAcc+'%':'—'}</div><div style="font-size:10px;color:#9ca3af;margin-top:2px">Reading</div></div>
    <div style="flex:1;background:#fff;border-radius:12px;padding:12px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.05)"><div style="font-size:20px;font-weight:900;color:#f59e0b">${progress.streak}</div><div style="font-size:10px;color:#9ca3af;margin-top:2px">Streak 🔥</div></div>
  </div>

  <div class="card" style="border:2px solid #fde68a;background:#fffbeb;margin-bottom:14px">
    <h2 style="font-size:14px;color:#78350f;margin-bottom:12px">🎯 Where to Focus This Week</h2>
    ${recs.map((r,i)=>`<div style="background:${r.color};border:1.5px solid ${r.border};border-radius:12px;padding:13px;margin-bottom:${i<recs.length-1?'8px':'0'}"><div style="font-weight:800;font-size:13px;color:${r.text};margin-bottom:5px">${r.icon} ${r.title}</div><div style="font-size:12px;color:${r.text};opacity:.85;line-height:1.6">${r.detail}</div></div>`).join('')}
  </div>

  ${aTotal>0?`<div class="card" style="margin-bottom:14px">
    <h2 style="font-size:14px;margin-bottom:14px">🔗 Analogy Accuracy by Type</h2>
    ${typeArr.map(x=>bar(x.type+' <span style="font-size:10px;font-weight:400;color:#9ca3af">('+x.t+' answered)</span>',x.c,x.t)).join('')}
    ${weakTypes.length>0?`<div style="background:#fff7ed;border-radius:10px;padding:10px 12px;margin-top:4px"><p style="font-size:11px;font-weight:800;color:#c2410c;margin-bottom:5px">Questions she missed in weak types:</p>${weakTypes.slice(0,3).map(x=>`<p style="font-size:11px;color:#92400e;margin-bottom:3px">• <strong>${x.type}:</strong> "${x.examples.slice(0,2).join('" · "')}"</p>`).join('')}</div>`:''}
  </div>`:''}

  ${vTotal>0?`<div class="card" style="margin-bottom:14px">
    <h2 style="font-size:14px;margin-bottom:14px">📖 Vocabulary — Accuracy by Difficulty</h2>
    ${[1,2,3].map(l=>{const s=lvlStats[l],t=s.c+s.i;return t>0?bar(['Level 1 — Easier','Level 2 — Medium','Level 3 — Hardest'][l-1],s.c,t):'';}).join('')}
    ${topMiss.length>0?`<div style="margin-top:14px"><p style="font-size:12px;font-weight:800;color:#374151;margin-bottom:8px">Most-missed words (highest miss rate first):</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
      ${topMiss.map(w=>`<div style="background:#f9fafb;border-radius:8px;padding:8px 10px"><div style="font-weight:800;font-size:13px;color:#0f2545">${w.w}</div><div style="font-size:10px;color:#9ca3af">${w.d.split(';')[0]}</div><div style="font-size:12px;font-weight:800;color:${w.rate>=60?'#dc2626':'#d97706'};margin-top:2px">${w.rate}% miss rate</div></div>`).join('')}
      </div></div>`:''}
    ${rootArr.length>0?`<div style="background:#f0fdf4;border-radius:10px;padding:10px 12px;margin-top:12px">
      <p style="font-size:12px;font-weight:800;color:#166534;margin-bottom:6px">🌿 Root word patterns in missed words:</p>
      ${rootArr.map(([root,data])=>`<p style="font-size:12px;color:#15803d;margin-bottom:3px">• <strong>${root}</strong> — missed in: ${data.words.join(', ')}</p>`).join('')}
      <p style="font-size:11px;color:#6b7280;margin-top:6px">Reviewing one root in the Root Words section unlocks multiple words at once.</p>
    </div>`:''}
  </div>`:''}

  ${rTotal>0?`<div class="card" style="margin-bottom:14px">
    <h2 style="font-size:14px;margin-bottom:14px">📜 Reading — Accuracy by Passage</h2>
    ${[0,1,2].map(pi=>{
      const pqs=Object.entries(progress.rh).filter(([k])=>k.startsWith(pi+'-'));
      if(!pqs.length) return '';
      const pc=pqs.reduce((s,[,h])=>s+h.c,0),pt=pqs.reduce((s,[,h])=>s+h.c+h.i,0);
      return bar(['Thoreau and the Art of Principled Refusal','The Microbiome and the Complexity of the Gut','The Unreliable Narrator and the Ethics of Storytelling','The Trolley Problem and the Limits of Moral Theory'][pi],pc,pt);
    }).join('')}
    ${rAcc!==null&&rAcc<70?`<div style="background:#eff6ff;border-radius:10px;padding:10px 12px;margin-top:6px"><p style="font-size:12px;color:#1e40af;line-height:1.5">💡 <strong>SSAT tip:</strong> Reading passages are open-book on the real test. Train her to find the exact sentence in the passage before choosing an answer — never answer from memory alone.</p></div>`:''}
  </div>`:''}

  <div class="card" style="background:#0f2545;color:#fff;margin-bottom:14px">
    <h2 style="font-size:14px;color:#93c5fd;margin-bottom:12px">📅 Suggested Weekly Schedule</h2>
    ${[{day:"Mon & Thu",task:"Daily Vocabulary (5 words)",color:"#3b82f6"},{day:"Tue & Fri",task:"Analogies (10–15 questions)",color:"#8b5cf6"},{day:"Wednesday",task:"Root Words (2 roots + quiz)",color:"#10b981"},{day:"Saturday",task:"Full reading passage + questions",color:"#f59e0b"},{day:"Sunday",task:"Review missed words from the week",color:"#ef4444"}].map(d=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.08)"><span style="width:80px;font-size:11px;font-weight:800;color:${d.color};flex-shrink:0">${d.day}</span><span style="font-size:13px;color:#e5e7eb">${d.task}</span></div>`).join('')}
    <p style="font-size:11px;color:#6b7280;margin-top:10px">${weeksLeft} weeks of practice remaining before October 2026</p>
  </div>`;
}

// ── RENDER ────────────────────────────────────────────────────
const NAV=[{id:'home',e:'🏠',l:'Home'},{id:'mywords',e:'✅',l:'My Words'},{id:'myquiz',e:'🧠',l:'My Quiz'},{id:'vocab',e:'📖',l:'Vocab'},{id:'roots',e:'🌿',l:'Roots'},{id:'progress',e:'📊',l:'Progress'}];
const screens={home:renderHome,vocab:renderVocab,roots:renderRoots,analogies:renderAnalogies,reading:renderReading,addword:renderAddWord,progress:renderProgress,parentdash:renderParentDash,mywords:renderMyWords,myquiz:renderMyQuiz,weeklyreview:renderWeeklyReview};
function render(){const html=screens[view]?screens[view]():'';document.getElementById('app').innerHTML=`<div class="screen">${html}</div><nav class="nav">${NAV.map(n=>`<button class="nav-btn${view===n.id?' active':''}" onclick="go('${n.id}')"><span class="ni">${n.e}</span><span>${n.l}</span></button>`).join('')}</nav>`}
Promise.all([
  fetch('root-words.txt').then(r=>r.text()),
  fetch('analogies.txt').then(r=>r.text()),
  fetch('vocab.txt').then(r=>r.text())
]).then(([rt,at,vt])=>{
  ROOTS=[...parseRoots(rt),...customRoots];
  ANALOGIES=parseAnalogies(at);
  BUILTIN_VOCAB=parseVocab(vt);
  aQueue=[...ANALOGIES].sort(()=>Math.random()-.5);

  // Sync from Firebase then render
  if(!fbRefP){render();return;}
  Promise.all([
    fbRefP.once('value').then(s=>s.val()),
    fbRefC.once('value').then(s=>s.val())
  ]).then(([fbP,fbC])=>{
    // Merge progress — Firebase wins if newer, otherwise push local up
    if(fbP&&fbP._ts){
      const localP=loadP();
      const localTs=localP.lastDate?new Date(localP.lastDate).getTime():0;
      if(fbP._ts>localTs){
        const merged={...mkP(),...fbP};delete merged._ts;
        progress=merged;
        localStorage.setItem(SK,JSON.stringify(progress));
      }
    } else if(progress.lastDate){
      fbRefP.set({...progress,_ts:Date.now()});
    }
    // Merge custom words — Firebase wins if newer, otherwise push local up
    if(fbC&&fbC._ts&&fbC.data){
      const localCTs=parseInt(localStorage.getItem(SK+"_c_ts")||"0");
      if(fbC._ts>localCTs){
        customWords=Array.isArray(fbC.data)?fbC.data:Object.values(fbC.data);
        localStorage.setItem(SK+"_c",JSON.stringify(customWords));
      }
    } else if(customWords.length>0){
      fbRefC.set({data:customWords,_ts:Date.now()});
    }
    // Merge custom roots from Firebase
    const fbCRRef=familyCode?fbDb.ref('families/'+familyCode+'/customRoots'):null;
    if(fbCRRef){
      fbCRRef.once('value').then(s=>{
        const fbCR=s.val();
        if(fbCR&&fbCR._ts&&fbCR.data){
          const localCRTs=parseInt(localStorage.getItem(SK+"_cr_ts")||"0");
          if(fbCR._ts>localCRTs){
            customRoots=Array.isArray(fbCR.data)?fbCR.data:Object.values(fbCR.data);
            localStorage.setItem(SK+"_cr",JSON.stringify(customRoots));
            ROOTS=[...parseRoots(rt),...customRoots];
          }
        } else if(customRoots.length>0){
          fbCRRef.set({data:customRoots,_ts:Date.now()});
        }
        render();
      }).catch(()=>render());
    } else { render(); }
  }).catch(()=>render());
}).catch(()=>render());
</script>
</body>
</html>
